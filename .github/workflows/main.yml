name: YouTube Bale Bot

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      
      - name: Setup FFmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg
      
      - name: Install Python deps
        run: pip install -r requirements.txt
      
      - name: Setup cookies
        env:
          YT_COOKIES: ${{ secrets.YT_COOKIES }}
        run: |
          if [ -n "$YT_COOKIES" ]; then
            echo "$YT_COOKIES" > ~/.youtube_cookies.txt
            echo "✅ Cookies loaded"
          else
            echo "⚠️ No cookies in secrets"
          fi
      
      - name: Run Bot
        run: python bot.py
      
      - name: Save offset
        if: always()
        run: |
          git config user.name "Bot"
          git config user.email "bot@github.com"
          cp ~/.youtube_bale_bot_offset.txt offset_yt.txt 2>/dev/null || true
          git add offset_yt.txt 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Update offset [skip ci]"
          git push || echo "Push skipped"
