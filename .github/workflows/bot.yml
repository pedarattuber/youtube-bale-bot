name: Ultimate Bale Downloader Bot

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *'

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fast Install System Dependencies (FFmpeg & Bun)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends aria2 ffmpeg
          
          # نصب موتور قدرتمند Bun برای حل چالش‌های یوتوب
          curl -fsSL https://bun.com/install | bash
          echo "$HOME/.bun/bin" >> $GITHUB_PATH

      - name: Install Python Dependencies (Latest yt-dlp)
        run: |
          python -m pip install --upgrade pip
          pip install pyTelegramBotAPI
          # نصب آخرین نسخه yt-dlp مستقیماً از گیت‌هاب برای دور زدن جدیدترین تحریم‌ها
          pip install -U https://github.com/yt-dlp/yt-dlp/archive/master.tar.gz

      - name: Setup YouTube Cookies
        env:
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}
        run: |
          if [ -n "$YOUTUBE_COOKIES" ]; then
            echo "$YOUTUBE_COOKIES" > youtube_cookies.txt
          else
            touch youtube_cookies.txt
          fi

      - name: Run Bot
        env:
          BALE_BOT_TOKEN: ${{ secrets.BALE_BOT_TOKEN }}
        run: |
          python bot.py
