name: Ultimate Bale Bot (Bun Engine)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *'

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fast Install Dependencies (Same as 0x00 dl)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends aria2 ffmpeg
          # نصب موتور Bun برای حل چالش n-sig
          curl -fsSL https://bun.com/install | bash
          echo "$HOME/.bun/bin" >> $GITHUB_PATH

      - name: Install Python Libs
        run: |
          python -m pip install --upgrade pip
          pip install pyTelegramBotAPI
          # نصب مستقیم از Master برای دریافت آخرین پچ‌های bypass
          pip install -U https://github.com/yt-dlp/yt-dlp/archive/master.tar.gz

      - name: Setup Cookies
        run: |
          echo "${{ secrets.YOUTUBE_COOKIES }}" > youtube_cookies.txt

      - name: Run Bot
        env:
          BALE_BOT_TOKEN: ${{ secrets.BALE_BOT_TOKEN }}
        run: python bot.py
