name: GitHub Repo Manager Bot

on:
  schedule:
    - cron: '0 */6 * * *'
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --force-reinstall python-telegram-bot[job-queue]
          pip install requests

      - name: Run bot
        run: |
          timeout 21600 python bot.py || true
